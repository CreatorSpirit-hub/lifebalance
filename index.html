<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeBalance OS v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="custom-scrollbar overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col justify-between hidden md:flex z-50">
            <div class="p-5 overflow-y-auto h-full custom-scrollbar space-y-6">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-600/30">
                        <i class="fa-solid fa-layer-group text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-md tracking-tight text-white">LifeBalance OS</h1>
                        <span class="text-xs text-indigo-400 font-semibold">v3.0 Dynamic Engine</span>
                    </div>
                </div>

                <div class="bg-gray-800/60 p-4 rounded-xl border border-gray-700/50">
                    <div class="flex justify-between text-xs font-bold mb-1">
                        <span class="text-gray-400"><i class="fa-solid fa-award text-yellow-500 mr-1"></i> Level <span id="sb-level">1</span></span>
                        <span class="text-indigo-400"><span id="sb-xp">0</span>/500 XP</span>
                    </div>
                    <div class="w-full bg-gray-700 h-2 rounded-full overflow-hidden">
                        <div id="sb-xp-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <nav class="space-y-1">
                    <button onclick="switchTab('dashboard')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-chart-pie w-5 text-center text-indigo-400"></i> Dashboard</button>
                    <button onclick="switchTab('routine')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-calendar-days w-5 text-center text-sky-400"></i> Smart Routine</button>
                    <button onclick="switchTab('reminders')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-bell w-5 text-center text-rose-400"></i> Reminders</button>
                    <button onclick="switchTab('study')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-graduation-cap w-5 text-center text-amber-400"></i> Study Hub</button>
                    <button onclick="switchTab('habits')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-circle-check w-5 text-center text-emerald-400"></i> Habits & Goals</button>
                    <button onclick="switchTab('wellness')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-heart w-5 text-center text-pink-400"></i> Wellness & Health</button>
                    <button onclick="switchTab('finance')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-wallet w-5 text-center text-teal-400"></i> Finance Ledger</button>
                    <button onclick="switchTab('ai-assistant')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-robot w-5 text-center text-purple-400"></i> AI Copilot</button>
                </nav>
            </div>

            <div class="p-4 border-t border-gray-800 bg-gray-950/40 space-y-2">
                <div class="flex gap-2">
                    <button onclick="exportData()" class="w-1/2 text-[11px] bg-gray-800 py-2 rounded-lg text-gray-300 hover:bg-gray-700 font-semibold">Export JSON</button>
                    <button onclick="clearAllData()" class="w-1/2 text-[11px] bg-red-950/40 border border-red-900/40 py-2 rounded-lg text-red-400 hover:bg-red-900/40 font-semibold">Reset Engine</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto custom-scrollbar bg-[#0f1422]">
            <header class="h-16 border-b border-gray-800 bg-gray-900/80 backdrop-blur flex items-center justify-between px-6 sticky top-0 z-40">
                <div class="text-sm bg-gray-800 px-3 py-1.5 rounded-xl text-gray-400 font-medium border border-gray-700/40 hidden sm:block">
                    <i class="fa-solid fa-clock-rotate-left mr-1 text-emerald-400"></i> Local Engine Synced
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <div class="text-sm font-bold text-white"><i class="fa-solid fa-cloud-sun text-amber-500 mr-1"></i> 74°F / Clear Sky</div>
                    </div>
                    <div class="w-px h-8 bg-gray-800"></div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs bg-indigo-500/10 text-indigo-400 px-2.5 py-1 rounded-md font-bold" id="header-xp-display">LVL 1</span>
                    </div>
                </div>
            </header>

            <div id="content-mount" class="p-6 max-w-7xl w-full mx-auto space-y-6">
                </div>
        </main>
    </div>

    <script>
        // CORE STATE STORE DEFINITIONS WITH AUTOMATIC FAILSAFE LOCALSTORAGE BACKUP
        const defaultState = {
            xp: 0, level: 1,
            routine: [
                { id: 1, day: 'Monday', class: 'Computer Systems Architecture', time: '09:00', room: 'Hall Alpha' },
                { id: 2, day: 'Wednesday', class: 'Mathematical Calculus II', time: '13:30', room: 'Lab 3' }
            ],
            reminders: [
                { id: 1, category: 'Class', msg: 'Revise algorithm layout modules', time: '08:00', done: false },
                { id: 2, category: 'Water', msg: 'Hydration Break', time: '12:00', done: true }
            ],
            subjects: [
                { id: 1, name: 'Computer Science', grade: 'A', attendance: 94 },
                { id: 2, name: 'Mathematics II', grade: 'B+', attendance: 85 }
            ],
            habits: [
                { id: 1, name: '60 Min Study Focus Blocks', streak: 4 },
                { id: 2, name: 'Morning Cardio Exercises', streak: 1 }
            ],
            goals: [
                { id: 1, text: 'Maintain > 3.8 GPA Engine', complete: false }
            ],
            finance: [
                { id: 1, type: 'income', desc: 'Tech Stipend Fund', amount: 350 },
                { id: 2, type: 'expense', desc: 'Premium Server Subscription', amount: 15 }
            ],
            wellness: { water: 1250, sleep: 7.2, mood: 'Productive' },
            notes: [], flashcards: [], chatHistory: []
        };

        let state = JSON.parse(localStorage.getItem('LIFEBALANCE_STORE')) || {...defaultState};

        function saveState() {
            localStorage.setItem('LIFEBALANCE_STORE', JSON.stringify(state));
            updateGamificationUI();
        }

        function updateGamificationUI() {
            document.getElementById('sb-level').innerText = state.level;
            document.getElementById('sb-xp').innerText = state.xp;
            document.getElementById('sb-xp-bar').style.width = `${(state.xp / 500) * 100}%`;
            document.getElementById('header-xp-display').innerText = `LVL ${state.level} (${state.xp} XP)`;
        }

        function addXP(amount) {
            state.xp += amount;
            if (state.xp >= 500) {
                state.xp -= 500;
                state.level += 1;
            }
            saveState();
        }

        // VIEW ROUTER CONTROLLER
        function switchTab(tabId) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white shadow-md');
                btn.classList.add('text-gray-400');
                if(btn.getAttribute('onclick').includes(tabId)) {
                    btn.classList.add('bg-indigo-600', 'text-white shadow-md');
                    btn.classList.remove('text-gray-400');
                }
            });

            const mount = document.getElementById('content-mount');
            mount.innerHTML = '';

            if (tabId === 'dashboard') {
                let incomingClasses = state.routine.length;
                let activeReminders = state.reminders.filter(r => !r.done).length;
                
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 space-y-6">
                            <div class="bg-gradient-to-r from-indigo-950/50 via-purple-950/30 to-gray-900 border border-indigo-500/20 p-6 rounded-2xl">
                                <h2 class="text-2xl font-black text-white mb-1">System Dashboard Core</h2>
                                <p class="text-sm text-gray-400">Engine tracking metrics running smoothly. Complete active quests to advance level tracking loops.</p>
                                <div class="flex gap-2 mt-4">
                                    <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-xs font-bold px-3 py-1.5 rounded-lg"><i class="fa-solid fa-calendar mr-1"></i> ${incomingClasses} Scheduled Matrix Blocks</span>
                                    <span class="bg-rose-500/10 text-rose-400 border border-rose-500/20 text-xs font-bold px-3 py-1.5 rounded-lg"><i class="fa-solid fa-bell mr-1"></i> ${activeReminders} Urgent Event Vectors</span>
                                </div>
                            </div>
                            
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="font-bold text-xs text-gray-400 uppercase tracking-wider mb-4"><i class="fa-solid fa-chart-line text-indigo-500 mr-2"></i>Productivity Matrix Analytics</h3>
                                <canvas id="dashLineChart" class="w-full h-48"></canvas>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="font-bold text-xs text-gray-400 uppercase tracking-wider mb-4"><i class="fa-solid fa-bolt-lightning text-amber-400 mr-2"></i>Active Reminders Checklist</h3>
                                <div id="dash-reminders-box" class="space-y-2"></div>
                            </div>
                        </div>
                    </div>`;
                renderDashReminders();
                initChart();
            }

            else if (tabId === 'routine') {
                mount.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-6">
                        <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                            <div>
                                <h2 class="text-xl font-black text-white">Smart Routine Matrix</h2>
                                <p class="text-xs text-gray-400">Structural setup parameters map into weekly calendar grids instantly.</p>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <input id="rot-class" type="text" placeholder="Class Name" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1.5 text-xs text-white">
                                <select id="rot-day" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1.5 text-xs text-white">
                                    <option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option>
                                </select>
                                <input id="rot-time" type="time" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1.5 text-xs text-white">
                                <input id="rot-room" type="text" placeholder="Room/Lab" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1.5 text-xs text-white">
                                <button onclick="saveRoutineItem()" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-4 py-1.5 rounded-xl text-white">Append Class</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-5 gap-4" id="routine-grid-box"></div>
                    </div>`;
