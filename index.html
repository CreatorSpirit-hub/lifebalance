<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeBalance OS v4.0</title>
    <!-- Tailwind CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="custom-scrollbar overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR NAVIGATION -->
        <aside class="w-66 bg-gray-900 border-r border-gray-800 flex flex-col justify-between hidden md:flex z-50">
            <div class="p-5 overflow-y-auto h-full custom-scrollbar space-y-5">
                <!-- App Logo -->
                <div class="flex items-center gap-3">
                    <div class="bg-gradient-to-tr from-indigo-500 to-purple-600 p-2.5 rounded-xl text-white shadow-lg">
                        <i class="fa-solid fa-graduation-cap text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-md tracking-tight text-white">LifeBalance OS</h1>
                        <span class="text-xs text-indigo-400 font-semibold">v4.0 Web Edition</span>
                    </div>
                </div>

                <!-- XP Gaming Level System -->
                <div class="bg-gray-800/60 p-4 rounded-xl border border-gray-700/50">
                    <div class="flex justify-between text-xs font-bold mb-1.5">
                        <span class="text-yellow-400"><i class="fa-solid fa-star mr-1"></i> Level <span id="sb-level">1</span></span>
                        <span class="text-indigo-400"><span id="sb-xp">0</span> / 500 XP</span>
                    </div>
                    <div class="w-full bg-gray-700 h-2.5 rounded-full overflow-hidden">
                        <div id="sb-xp-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Sidebar Tabs -->
                <nav class="space-y-1">
                    <button onclick="switchTab('dashboard')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-house w-5 text-center text-indigo-400"></i> Home Dashboard</button>
                    <button onclick="switchTab('routine')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-calendar-week w-5 text-center text-sky-400"></i> School Routine</button>
                    <button onclick="switchTab('reminders')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-bell w-5 text-center text-rose-400"></i> Reminders</button>
                    <button onclick="switchTab('study')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-book-open w-5 text-center text-amber-400"></i> Study Hub</button>
                    <button onclick="switchTab('habits')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-check-double w-5 text-center text-emerald-400"></i> Habits & Goals</button>
                    <button onclick="switchTab('wellness')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-heart beat w-5 text-center text-pink-400"></i> Health & Wellness</button>
                    <button onclick="switchTab('finance')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-wallet w-5 text-center text-teal-400"></i> Money Tracker</button>
                    <button onclick="switchTab('ai-assistant')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-robot w-5 text-center text-purple-400"></i> AI Study Helper</button>
                </nav>
            </div>

            <!-- Bottom Control Panel -->
            <div class="p-4 border-t border-gray-800 bg-gray-950/40 space-y-2">
                <div class="flex gap-2">
                    <button onclick="exportData()" class="w-1/2 text-[11px] bg-gray-800 py-2 rounded-lg text-gray-300 hover:bg-gray-700 font-bold"><i class="fa-solid fa-download mr-1"></i> Export Data</button>
                    <button onclick="clearAllData()" class="w-1/2 text-[11px] bg-red-950/20 border border-red-900/40 py-2 rounded-lg text-red-400 hover:bg-red-900/30 font-bold"><i class="fa-solid fa-trash mr-1"></i> Reset App</button>
                </div>
            </div>
        </aside>

        <!-- MAIN APP WINDOW -->
        <main class="flex-1 flex flex-col overflow-y-auto custom-scrollbar bg-[#0f1422]">
            <!-- Top Dashboard Bar -->
            <header class="h-16 border-b border-gray-800 bg-gray-900/80 backdrop-blur flex items-center justify-between px-6 sticky top-0 z-40">
                <div class="text-xs bg-gray-800 px-3 py-1.5 rounded-xl text-gray-400 font-medium border border-gray-700/40">
                    <span id="top-quote-text">"Small daily improvements over time lead to stunning results."</span>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <div class="text-xs font-bold text-white"><i class="fa-solid fa-cloud-sun text-amber-500 mr-1"></i> 26°C / Kathmandu, NP</div>
                    </div>
                    <div class="w-px h-8 bg-gray-800"></div>
                    <div id="header-badge" class="text-xs bg-indigo-500/10 text-indigo-400 px-2.5 py-1 rounded-md font-bold">LVL 1 Profile</div>
                </div>
            </header>

            <!-- Main Display Mounting Node -->
            <div id="content-mount" class="p-6 max-w-7xl w-full mx-auto space-y-6"></div>
        </main>
    </div>

    <!-- MAIN INTERACTIVE APP JAVASCRIPT ENGINE -->
    <script>
        const defaultState = {
            xp: 0, level: 1,
            routine: [
                { id: 1, day: 'Monday', class: 'English Grammar', time: '09:00', room: 'Class 10-A' },
                { id: 2, day: 'Wednesday', class: 'Compulsory Mathematics', time: '11:00', room: 'Hall Room' }
            ],
            reminders: [
                { id: 1, category: 'Homework', msg: 'Finish English Exercise 4', time: '18:00', done: false },
                { id: 2, category: 'Water', msg: 'Drink a glass of water', time: '14:00', done: true }
            ],
            subjects: [
                { id: 1, name: 'English', grade: 'A', attendance: 95 },
                { id: 2, name: 'Mathematics', grade: 'A+', attendance: 90 }
            ],
            exams: [
                { id: 1, name: 'Board Mock Test', date: '2026-04-15' }
            ],
            habits: [
                { id: 1, name: 'Solve 1 Math Set Question', streak: 5 },
                { id: 2, name: 'Read English Book for 15 mins', streak: 2 }
            ],
            goals: [
                { id: 1, text: 'Score high marks in Final Exams', complete: false }
            ],
            visionBoard: [
                { id: 1, text: 'Top Student Award Ceremony' }
            ],
            finance: [
                { id: 1, type: 'income', desc: 'Monthly Pocket Money allowance', amount: 1500 },
                { id: 2, type: 'expense', desc: 'New Geometry Notebook bought', amount: 120 }
            ],
            wellness: { water: 1500, sleep: 8, mood: 'Happy', weight: 58, bmi: 20.5 },
            workouts: [
                { id: 1, name: '15 Pushups & Light Stretching', complete: false }
            ],
            achievements: [
                { id: 1, name: "First Steps", desc: "Reach Level 2", unlocked: false },
                { id: 2, name: "Study Scholar", desc: "Reach Level 5", unlocked: false },
                { id: 3, name: "Habit Master", desc: "Reach Level 10", unlocked: false }
            ],
            flashcards: [], chatHistory: []
        };

        let state = JSON.parse(localStorage.getItem('LIFEBALANCE_V40_DATA')) || {...defaultState};

        // Pomodoro State Variables
        let pMins = 25;
        let pSecs = 0;
        let pInterval = null;

        function saveState() {
            localStorage.setItem('LIFEBALANCE_V40_DATA', JSON.stringify(state));
            updateGamificationUI();
        }

        function updateGamificationUI() {
            document.getElementById('sb-level').innerText = state.level;
            document.getElementById('sb-xp').innerText = state.xp;
            document.getElementById('sb-xp-bar').style.width = `${(state.xp / 500) * 100}%`;
            document.getElementById('header-badge').innerText = `Level ${state.level} Student`;
            
            // Auto check Achievement system status updates
            state.achievements.forEach(ach => {
                if (!ach.unlocked && state.level >= (ach.id === 1 ? 2 : ach.id === 2 ? 5 : 10)) { 
                    ach.unlocked = true;
                    alert(`🏆 Achievement Unlocked: ${ach.name}! - ${ach.desc}`);
                }
            });
        }

        function addXP(amount) {
            state.xp += amount;
            if (state.xp >= 500) {
                state.xp -= 500;
                state.level += 1;
                alert(`🎉 Fantastic! You leveled up to Level ${state.level}! Keep crushing your student tasks!`);
            }
            saveState();
        }

        // TAB NAVIGATION ROUTING CONTROLLER
        function switchTab(tabId) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-md');
                btn.classList.add('text-gray-400');
                if(btn.getAttribute('onclick').includes(tabId)) {
                    btn.classList.add('bg-indigo-600', 'text-white', 'shadow-md');
                    btn.classList.remove('text-gray-400');
                }
            });

            const mount = document.getElementById('content-mount');
            mount.innerHTML = '';

            // 1. HOME DASHBOARD TAB (With Live Performance Scoring Card)
            if (tabId === 'dashboard') {
                let openTasks = state.reminders.filter(r => !r.done).length;
                let totalItems = state.reminders.length + state.habits.length;
                let completedItems = state.reminders.filter(r => r.done).length + state.habits.filter(h => h.streak > 0).length;
                let performancePct = totalItems > 0 ? Math.round((completedItems / totalItems) * 100) : 0;

                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 space-y-6">
                            <div class="bg-gradient-to-r from-indigo-900/60 via-purple-900/40 to-gray-900 border border-indigo-500/20 p-6 rounded-2xl">
                                <h2 class="text-2xl font-black text-white mb-1">Your Daily Learning Station 🚀</h2>
                                <p class="text-sm text-gray-300">Welcome back! You have <span class="text-yellow-400 font-bold">${openTasks} tasks</span> waiting for your attention today.</p>
                                <div class="mt-4 flex flex-wrap gap-2">
                                    <span class="bg-indigo-500/20 text-indigo-300 px-3 py-1.5 rounded-lg text-xs font-semibold"><i class="fa-solid fa-graduation-cap mr-1"></i> Productive Mindset Active</span>
                                </div>
                            </div>

                            <!-- Live Productivity Rating Score -->
                            <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex items-center justify-between">
                                <div>
                                    <div class="text-[11px] font-bold text-gray-400 uppercase">Daily Productivity Score</div>
                                    <div class="text-xl font-extrabold text-emerald-400 mt-0.5">${performancePct}% Tasks Completed</div>
                                </div>
                                <div class="w-12 h-12 rounded-full border-4 border-gray-800 border-t-emerald-500 flex items-center justify-center text-xs font-bold text-white">📈</div>
                            </div>
                            
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="text-sm font-bold text-gray-400 uppercase mb-4"><i class="fa-solid fa-chart-line text-indigo-400 mr-2"></i>Weekly Productive Study Hours</h3>
                                <canvas id="dashLineChart" class="w-full h-48"></canvas>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <!-- Unlocked Badges / Achievement Tracking Panel -->
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="text-sm font-bold text-gray-400 uppercase mb-3"><i class="fa-solid fa-trophy text-yellow-500 mr-2"></i>Unlocked Badges</h3>
                                <div class="space-y-2">
                                    ${state.achievements.map(a => `
                                        <div class="flex items-center gap-3 p-2 rounded-lg ${a.unlocked ? 'bg-amber-500/10 border border-amber-500/20' : 'bg-gray-800/30 opacity-40'}">
                                            <span class="text-lg">${a.unlocked ? '🥇' : '🔒'}</span>
                                            <div>
                                                <div class="text-xs font-bold text-gray-200">${a.name}</div>
                                                <div class="text-[10px] text-gray-400">${a.desc}</div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="text-sm font-bold text-gray-400 uppercase mb-3"><i class="fa-solid fa-list-check text-rose-400 mr-2"></i>Quick Tasks For Today</h3>
                                <div id="dash-reminders-box" class="space-y-2"></div>
                            </div>
                        </div>
                    </div>`;
                renderDashReminders();
                initChart();
            }

            // 2. TIMETABLE TAB
            else if (tabId === 'routine') {
                mount.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-6">
                        <div class="flex flex-col lg:flex-row justify-between lg:items-center gap-4">
                            <div>
                                <h2 class="text-xl font-black text-white">Weekly Class Timetable</h2>
                                <p class="text-xs text-gray-400">Map out your daily school or coaching class timings below.</p>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <input id="rot-class" type="text" placeholder="Class Name" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1.5 text-xs text-white">
                                <select id="rot-day" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1.5 text-xs text-white">
                                    <option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option>
                                </select>
                                <input id="rot-time" type="time" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1.5 text-xs text-white">
                                <input id="rot-room" type="text" placeholder="Room/Teacher" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1.5 text-xs text-white">
                                <button onclick="saveRoutineItem()" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-4 py-2 rounded-xl text-white">Add Class</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-5 gap-4" id="routine-grid-box"></div>
                    </div>`;
                renderRoutineView();
            }

            // 3. REMINDERS TAB
            else if (tabId === 'reminders') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                            <h2 class="text-xl font-black text-white">Active Alerts & Tasks</h2>
                            <div id="full-reminder-list" class="space-y-2"></div>
                        </div>
                        <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl h-fit space-y-4">
                            <h3 class="text-sm font-bold text-gray-400 uppercase">Create Dynamic Alert</h3>
                            <input id="rem-msg" type="text" placeholder="What do you need to do?" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-2.5 text-xs text-white">
                            <div class="grid grid-cols-2 gap-2">
                                <input id="rem-time-val" type="time" class="bg-gray-800 border border-gray-700 rounded-xl p-2.5 text-xs text-white">
                                <select id="rem-cat" class="bg-gray-800 border border-gray-700 rounded-xl p-2.5 text-xs text-white">
                                    <option>Homework</option><option>Class</option><option>Water Break</option><option>Sleep</option>
                                </select>
                            </div>
                            <button onclick="commitReminder()" class="w-full bg-indigo-600 hover:bg-indigo-700 py-2.5 rounded-xl text-xs font-bold text-white">Save Reminder</button>
                        </div>
                    </div>`;
                renderRemindersView();
            }

            // 4. STUDY HUB TAB
            else if (tabId === 'study') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 space-y-6">
                            <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                                <div class="flex justify-between items-center">
                                    <h2 class="text-xl font-black text-white">Subject & Mark Tracker</h2>
                                    <div class="flex flex-wrap gap-2">
                                        <input id="sub-name" type="text" placeholder="Subject Name" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1 text-xs text-white">
                                        <input id="sub-grade" type="text" placeholder="Grade (A+)" class="w-16 bg-gray-800 border border-gray-700 rounded-xl px-3 py-1 text-xs text-white">
                                        <input id="sub-attn" type="number" placeholder="Attendance %" class="w-24 bg-gray-800 border border-gray-700 rounded-xl px-3 py-1 text-xs text-white">
                                        <button onclick="commitSubject()" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-3 py-1 rounded-xl text-white">Add</button>
                                    </div>
                                </div>
                                <div id="subject-box-list" class="space-y-2"></div>
                            </div>

                            <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                                <div class="flex justify-between items-center">
                                    <h2 class="text-md font-bold text-white">Upcoming Exams</h2>
                                    <div class="flex gap-2">
                                        <input id="ex-name" type="text" placeholder="Exam Title" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1 text-xs text-white">
                                        <input id="ex-date" type="date" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1 text-xs text-white">
                                        <button onclick="commitExam()" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-3 py-1 rounded-xl text-white">Add Exam</button>
                                    </div>
                                </div>
                                <div id="exam-countdown-list" class="space-y-2"></div>
                            </div>

                            <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                                <div class="flex justify-between items-center">
                                    <h2 class="text-md font-bold text-white">Smart Revision Flashcards</h2>
                                    <div class="flex gap-2">
                                        <input id="fc-q" type="text" placeholder="Question" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1 text-xs text-white">
                                        <input id="fc-a" type="text" placeholder="Answer" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1 text-xs text-white">
                                        <button onclick="commitFlashcard()" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-3 py-1 rounded-xl text-white">Create Card</button>
                                    </div>
                                </div>
                                <div id="flashcard-box-list" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl text-center">
                                <div class="text-xs font-bold text-gray-500 uppercase mb-1">Estimated GPA Rating</div>
                                <div class="text-4xl font-black text-amber-400" id="gpa-display-val">3.90</div>
                            </div>
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="font-bold text-xs text-gray-400 uppercase mb-2">Total Attendance Average</h3>
                                <div class="w-full bg-gray-800 h-2.5 rounded-full overflow-hidden">
                                    <div id="attendance-progress-bar" class="bg-emerald-500 h-full" style="width: 0%"></div>
                                </div>
                                <div class="text-[11px] text-gray-400 mt-2 text-right" id="attendance-pct-lbl">0% Attended</div>
                            </div>
                        </div>
                    </div>`;
                renderStudyView();
            }

            // 5. HABITS & GOALS TAB
            else if (tabId === 'habits') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 space-y-6">
                            <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                                <div class="flex justify-between items-center">
                                    <h2 class="text-xl font-black text-white">Daily Habits Tracker</h2>
                                    <div class="flex gap-2">
                                        <input id="hb-name" type="text" placeholder="Enter new habit..." class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1 text-xs text-white">
                                        <button onclick="commitHabit()" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-4 py-1 rounded-xl text-white">Create</button>
                                    </div>
                                </div>
                                <div id="habits-box-list" class="space-y-2"></div>
                            </div>

                            <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                                <div class="flex justify-between items-center">
                                    <h2 class="text-md font-bold text-white">Long Term Target Goals</h2>
                                    <div class="flex gap-2">
                                        <input id="gl-text" type="text" placeholder="Enter target objective..." class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1 text-xs text-white">
                                        <button onclick="commitGoal()" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-4 py-1 rounded-xl text-white">Save Goal</button>
                                    </div>
                                </div>
                                <div id="goals-box-list" class="space-y-2"></div>
                            </div>

                            <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                                <div class="flex justify-between items-center">
                                    <h2 class="text-md font-bold text-white">Vision Dream Board</h2>
                                    <div class="flex gap-2">
                                        <input id="vb-text" type="text" placeholder="What are you striving for?" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-1 text-xs text-white">
                                        <button onclick="commitVision()" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-4 py-1 rounded-xl text-white">Pin</button>
                                    </div>
                                </div>
                                <div id="vision-box-list" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
                            </div>
                        </div>

                        <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl h-fit">
                            <h3 class="font-bold text-xs text-gray-400 uppercase mb-3">Habit Heatmap Activity</h3>
                            <div class="grid grid-cols-7 gap-1.5" id="heatmap-render-node"></div>
                        </div>
                    </div>`;
                renderHabitsView();
            }

            // 6. HEALTH & WELLNESS TAB (With Integrated Focus Pomodoro Countdown)
            else if (tabId === 'wellness') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-6">
                            <h2 class="text-xl font-black text-white">Health & Fitness Tracker</h2>
                            
                            <div class="p-4 bg-gray-800/40 border border-gray-700/30 rounded-xl flex justify-between items-center">
                                <div>
                                    <div class="text-xs text-gray-400 font-bold uppercase">Daily Water Level</div>
                                    <div class="text-xl font-black text-white mt-1"><span id="lbl-water-val">${state.wellness.water}</span> / 3000 ml</div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="adjustWater(250)" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold px-3 py-2 rounded-xl border border-gray-700 text-sky-400">+250ml</button>
                                    <button onclick="adjustWater(500)" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold px-3 py-2 rounded-xl border border-gray-700 text-sky-400">+500ml</button>
                                </div>
                            </div>

                            <div class="p-4 bg-gray-800/40 border border-gray-700/30 rounded-xl flex justify-between items-center">
                                <div>
                                    <div class="text-xs text-gray-400 font-bold uppercase">Sleep Tracking</div>
                                    <div class="text-xl font-black text-white mt-1"><span id="lbl-sleep-val">${state.wellness.sleep}</span> Hours Logged</div>
                                </div>
                                <input type="number" step="0.5" class="w-20 bg-gray-800 border border-gray-700 rounded-xl p-1.5 text-center text-xs text-white" placeholder="Hours" onchange="adjustSleep(this.value)">
                            </div>

                            <div class="p-4 bg-gray-800/40 border border-gray-700/30 rounded-xl space-y-3">
                                <div class="text-xs text-gray-400 font-bold uppercase">Weight & BMI Log</div>
                                <div class="flex gap-2">
                                    <input id="inp-weight" type="number" placeholder="Weight (kg)" class="w-1/2 bg-gray-800 border border-gray-700 rounded-xl p-2 text-xs text-white">
                                    <button onclick="saveWeight()" class="w-1/2 bg-indigo-600 hover:bg-indigo-700 text-xs font-bold rounded-xl text-white">Calculate BMI</button>
                                </div>
                                <div class="text-xs text-gray-300 mt-1" id="bmi-label-display">Weight: ${state.wellness.weight || 0}kg | BMI: ${state.wellness.bmi || 0}</div>
                            </div>
                        </div>

                        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-6">
                            <!-- Advanced Focus Pomodoro System -->
                            <div>
                                <h2 class="text-xl font-black text-white mb-2">Focused Pomodoro Timer</h2>
                                <div class="bg-purple-950/20 border border-purple-500/20 p-5 rounded-xl text-center space-y-3">
                                    <div class="text-4xl font-mono font-black text-purple-400" id="pomodoro-display">25:00</div>
                                    <div class="flex justify-center gap-2">
                                        <button onclick="startPomodoro()" class="bg-purple-600 hover:bg-purple-700 text-xs font-bold px-5 py-2 rounded-xl text-white">Start Session</button>
                                        <button onclick="resetPomodoro()" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold px-5 py-2 rounded-xl border border-gray-700 text-gray-300">Reset</button>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-3">
                                <div class="flex justify-between items-center">
                                    <h3 class="font-bold text-xs text-gray-400 uppercase">Workout Exercises</h3>
                                    <div class="flex gap-2">
                                        <input id="wk-name" type="text" placeholder="Exercise name..." class="bg-gray-800 border border-gray-700 rounded-xl px-2 py-1 text-xs text-white">
                                        <button onclick="commitWorkout()" class="bg-indigo-600 text-xs font-bold px-3 py-1 rounded-xl text-white">Add</button>
                                    </div>
                                </div>
                                <div id="workout-box-list" class="space-y-2"></div>
                            </div>
                        </div>
                    </div>`;
                renderWellnessView();
                // Ensure text accurately updates if active pomodoro session is currently running in background
                document.getElementById('pomodoro-display').innerText = `${String(pMins).padStart(2, '0')}:${String(pSecs).padStart(2, '0')}`;
            }

            // 7. MONEY TRACKER TAB
            else if (tabId === 'finance') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                            <h2 class="text-xl font-black text-white">Student Money Ledger</h2>
                            <div id="finance-box-list" class="space-y-2"></div>
                        </div>
                        <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl h-fit space-y-4">
                            <h3 class="font-bold text-xs text-gray-400 uppercase">Add Transaction</h3>
                            <input id="fin-desc" type="text" placeholder="Description" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-2.5 text-xs text-white">
                            <div class="grid grid-cols-2 gap-2">
                                <input id="fin-amt" type="number" placeholder="Amount (Rs.)" class="bg-gray-800 border border-gray-700 rounded-xl p-2.5 text-xs text-white">
                                <select id="fin-type" class="bg-gray-800 border border-gray-700 rounded-xl p-2.5 text-xs text-white">
                                    <option value="income">Income (+)</option>
                                    <option value="expense">Expense (-)</option>
                                </select>
                            </div>
                            <button onclick="commitFinance()" class="w-full bg-indigo-600 hover:bg-indigo-700 py-2.5 rounded-xl text-xs font-bold text-white">Save Entry</button>
                            <div class="h-px bg-gray-800 my-2"></div>
                            <div class="flex justify-between items-center text-xs text-gray-400 font-bold">
                                <span>Net Wallet Savings:</span>
                                <span class="text-emerald-400 text-sm" id="fin-total-lbl">Rs. 0</span>
                            </div>
                        </div>
                    </div>`;
                renderFinanceView();
            }

            // 8. AI STUDY HELP TAB
            else if (tabId === 'ai-assistant') {
                mount.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl flex flex-col h-[480px]">
                        <div class="flex items-center gap-3 border-b border-gray-800 pb-4 mb-4">
                            <div class="bg-purple-600/20 text-purple-400 p-2.5 rounded-xl border border-purple-500/20"><i class="fa-solid fa-robot text-lg"></i></div>
                            <div>
                                <h2 class="font-black text-white text-md">AI Personal Study Copilot</h2>
                                <p class="text-xs text-gray-400">Ask simple questions to optimize notes and target revision workflows.</p>
                            </div>
                        </div>
                        <div id="chat-scroller" class="flex-1 overflow-y-auto custom-scrollbar space-y-3 pr-2 text-xs"></div>
                        <div class="flex gap-2 border-t border-gray-800 pt-4 mt-2">
                            <input id="ai-query-input" type="text" placeholder="Ask your AI assistant anything..." class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-xs text-white focus:outline-none" onkeydown="if(event.key === 'Enter') dispatchAIQuery()">
                            <button onclick="dispatchAIQuery()" class="bg-purple-600 hover:bg-purple-700 text-xs font-bold px-5 py-2 rounded-xl text-white">Send</button>
                        </div>
                    </div>`;
                renderAIHistory();
            }
        }

        // ================= ENGINE WORKFLOW SUB-FUNCTIONS =================

        function startPomodoro() {
            if (pInterval) return;
            pInterval = setInterval(() => {
                if (pSecs === 0) {
                    if (pMins === 0) {
                        clearInterval(pInterval);
                        pInterval = null;
                        alert("⏰ Time's up! Take a short break.");
                        addXP(50);
                        resetPomodoro();
                        return;
                    }
                    pMins--;
                    pSecs = 59;
                } else {
                    pSecs--;
                }
                if(document.getElementById('pomodoro-display')) {
                    document.getElementById('pomodoro-display').innerText = 
                        `${String(pMins).padStart(2, '0')}:${String(pSecs).padStart(2, '0')}`;
                }
            }, 1000);
        }

        function resetPomodoro() {
            clearInterval(pInterval);
            pInterval = null;
            pMins = 25;
            pSecs = 0;
            if(document.getElementById('pomodoro-display')) {
                document.getElementById('pomodoro-display').innerText = "25:00";
            }
        }

        function renderDashReminders() {
            const container = document.getElementById('dash-reminders-box');
            if(!container) return;
            container.innerHTML = state.reminders.map(r => `
                <div class="flex items-center justify-between bg-gray-800/40 p-3 rounded-xl border border-gray-800">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${r.done ? 'checked' : ''} onclick="toggleReminder(${r.id})" class="w-4 h-4 rounded text-indigo-600 bg-gray-900 border-gray-700">
                        <span class="text-xs ${r.done ? 'line-through text-gray-500' : 'text-gray-200'}">${r.msg}</span>
                    </div>
                </div>
            `).join('') || '<div class="text-xs text-gray-600 italic">No tasks.</div>';
        }

        function toggleReminder(id) {
            let item = state.reminders.find(r => r.id === id);
            if(item) {
                item.done = !item.done;
                if(item.done) addXP(30);
                saveState();
                renderDashReminders();
                if(document.getElementById('full-reminder-list')) renderRemindersView();
            }
        }

        function renderRoutineView() {
            const grid = document.getElementById('routine-grid-box');
            if(!grid) return;
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            grid.innerHTML = days.map(day => {
                let targets = state.routine.filter(r => r.day === day);
                return `
                    <div class="bg-gray-950/40 p-3 rounded-xl border border-gray-800 min-h-[200px]">
                        <h4 class="text-xs font-extrabold text-indigo-400 mb-3 uppercase border-b border-gray-800 pb-1">${day}</h4>
                        <div class="space-y-2">
                            ${targets.map(t => `
                                <div class="bg-gray-800 p-2 rounded-lg border border-gray-700/50 relative group">
                                    <div class="font-bold text-white text-xs">${t.class}</div>
                                    <div class="text-[10px] text-gray-400 mt-1 flex justify-between">
                                        <span>${t.time}</span><span>${t.room}</span>
                                    </div>
                                    <button onclick="killRoutineItem(${t.id})" class="absolute top-1 right-1 text-red-400 text-[10px] hidden group-hover:block"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }).join('');
        }

        function saveRoutineItem() {
            let cls = document.getElementById('rot-class').value;
            let day = document.getElementById('rot-day').value;
            let time = document.getElementById('rot-time').value;
            let room = document.getElementById('rot-room').value;
            if(!cls || !time) return;
            state.routine.push({ id: Date.now(), day, class: cls, time, room });
            addXP(25);
            saveState();
            renderRoutineView();
            document.getElementById('rot-class').value = '';
        }

        function killRoutineItem(id) {
            state.routine = state.routine.filter(r => r.id !== id);
            saveState();
            renderRoutineView();
        }

        function renderRemindersView() {
            const box = document.getElementById('full-reminder-list');
            if(!box) return;
            box.innerHTML = state.reminders.map(r => `
                <div class="flex items-center justify-between bg-gray-800/30 p-3 rounded-xl border border-gray-800">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${r.done ? 'checked' : ''} onclick="toggleReminder(${r.id})" class="w-4 h-4 text-indigo-600 bg-gray-900 border-gray-700">
                        <span class="text-xs ${r.done ? 'line-through text-gray-500' : 'text-gray-200'}">${r.msg}</span>
                    </div>
                    <button onclick="killReminder(${r.id})" class="text-xs text-gray-500 hover:text-red-400"><i class="fa-solid fa-trash"></i></button>
                </div>`).join('');
        }

        function commitReminder() {
            let msg = document.getElementById('rem-msg').value;
            let time = document.getElementById('rem-time-val').value;
            let cat = document.getElementById('rem-cat').value;
            if(!msg || !time) return;
            state.reminders.push({ id: Date.now(), category: cat, msg, time, done: false });
            addXP(20);
            saveState();
            renderRemindersView();
            document.getElementById('rem-msg').value = '';
        }

        function killReminder(id) {
            state.reminders = state.reminders.filter(r => r.id !== id);
            saveState();
            renderRemindersView();
        }

        function renderStudyView() {
            const list = document.getElementById('subject-box-list');
            list.innerHTML = state.subjects.map(s => `
                <div class="bg-gray-800/40 p-3 rounded-xl border border-gray-800 flex justify-between items-center">
                    <div>
                        <div class="text-xs font-bold text-white">${s.name}</div>
                        <div class="text-[11px] text-gray-400">Attendance: <span class="text-emerald-400">${s.attendance}%</span></div>
                    </div>
                    <span class="text-xs bg-indigo-500/10 text-indigo-400 px-2 rounded font-bold">${s.grade}</span>
                </div>`).join('');

            const exBox = document.getElementById('exam-countdown-list');
            exBox.innerHTML = state.exams.map(ex => `
                <div class="bg-gray-800/50 p-3 rounded-xl border border-gray-800 flex justify-between items-center text-xs">
                    <div><span class="font-bold text-white">${ex.name}</span></div>
                    <span class="bg-rose-500/10 text-rose-400 px-2 py-0.5 rounded font-bold">${ex.date}</span>
                </div>`).join('');

            const fcBox = document.getElementById('flashcard-box-list');
            fcBox.innerHTML = state.flashcards.map(f => `
                <div class="bg-gray-800/30 p-3 rounded-xl border border-gray-800 flex flex-col justify-between h-20 cursor-pointer" onclick="this.querySelector('.fc-ans').classList.toggle('hidden')">
                    <div class="text-xs font-bold text-white">Q: ${f.q}</div>
                    <div class="text-xs font-medium text-emerald-400 fc-ans hidden">A: ${f.a}</div>
                </div>`).join('') || '<div class="text-xs text-gray-600 italic">No cards.</div>';
        }

        function commitSubject() {
            let name = document.getElementById('sub-name').value;
            let grade = document.getElementById('sub-grade').value;
            let attn = document.getElementById('sub-attn').value;
            if(!name || !grade || !attn) return;
            state.subjects.push({ id: Date.now(), name, grade, attendance: parseInt(attn) });
            addXP(40); saveState(); renderStudyView();
        }

        function commitExam() {
            let name = document.getElementById('ex-name').value;
            let date = document.getElementById('ex-date').value;
            if(!name || !date) return;
            state.exams.push({ id: Date.now(), name, date });
            saveState(); renderStudyView();
        }

        function commitFlashcard() {
            let q = document.getElementById('fc-q').value;
            let a = document.getElementById('fc-a').value;
            if(!q || !a) return;
            state.flashcards.push({ id: Date.now(), q, a });
            saveState(); renderStudyView();
        }

        function renderHabitsView() {
            const list = document.getElementById('habits-box-list');
            list.innerHTML = state.habits.map(h => `
                <div class="bg-gray-800/40 p-3 rounded-xl border border-gray-800 flex justify-between items-center">
                    <div>
                        <div class="text-xs font-bold text-white">${h.name}</div>
                        <div class="text-[11px] text-gray-400">Streak: ${h.streak} days</div>
                    </div>
                    <button onclick="bumpHabit(${h.id})" class="bg-emerald-600 text-xs px-3 py-1 rounded-lg font-bold text-white">Done</button>
                </div>`).join('');

            const gl = document.getElementById('goals-box-list');
            gl.innerHTML = state.goals.map(g => `
                <div class="flex items-center gap-3 bg-gray-800/20 p-2.5 rounded-xl border border-gray-800">
                    <input type="checkbox" ${g.complete ? 'checked' : ''} onclick="toggleGoal(${g.id})" class="w-4 h-4 rounded text-indigo-600 bg-gray-900 border-gray-700">
                    <span class="text-xs ${g.complete ? 'line-through text-gray-500' : 'text-gray-200'}">${g.text}</span>
                </div>`).join('');

            const vb = document.getElementById('vision-box-list');
            vb.innerHTML = state.visionBoard.map(v => `<div class="bg-indigo-950 p-3 rounded-xl border border-indigo-500/20 text-center text-xs font-semibold">${v.text}</div>`).join('');

            const heatmap = document.getElementById('heatmap-render-node');
            heatmap.innerHTML = '';
            for(let i=0; i<35; i++) {
                let bg = (i % 5 === 0) ? 'bg-emerald-600' : 'bg-gray-800';
                heatmap.innerHTML += `<div class="w-full aspect-square rounded-sm ${bg}"></div>`;
            }
        }

        function commitHabit() {
            let name = document.getElementById('hb-name').value;
            if(!name) return;
            state.habits.push({ id: Date.now(), name, streak: 0 });
            saveState(); renderHabitsView();
        }

        function bumpHabit(id) {
            let h = state.habits.find(x => x.id === id);
            if(h) { h.streak += 1; addXP(25); saveState(); renderHabitsView(); }
        }

        function commitGoal() {
            let text = document.getElementById('gl-text').value;
            if(!text) return;
            state.goals.push({ id: Date.now(), text, complete: false });
            saveState(); renderHabitsView();
        }

        function toggleGoal(id) {
            let g = state.goals.find(x => x.id === id);
            if(g) { g.complete = !g.complete; if(g.complete) addXP(50); saveState(); renderHabitsView(); }
        }

        function commitVision() {
            let text = document.getElementById('vb-text').value;
            if(!text) return;
            state.visionBoard.push({ id: Date.now(), text });
            saveState(); renderHabitsView();
        }

        function renderWellnessView() {
            const list = document.getElementById('workout-box-list');
            if(!list) return;
            list.innerHTML = state.workouts.map(w => `<div class="bg-gray-800 p-2 rounded-xl text-xs">${w.name}</div>`).join('');
        }

        function commitWorkout() {
            let name = document.getElementById('wk-name').value;
            if(!name) return;
            state.workouts.push({ id: Date.now(), name, complete: false });
            saveState(); renderWellnessView();
        }

        function adjustWater(amt) {
            state.wellness.water += amt; addXP(10); saveState();
            document.getElementById('lbl-water-val').innerText = state.wellness.water;
        }

        function adjustSleep(val) {
            if(!val) return; state.wellness.sleep = parseFloat(val); saveState();
            document.getElementById('lbl-sleep-val').innerText = state.wellness.sleep;
        }

        function saveWeight() {
            let w = document.getElementById('inp-weight').value;
            if(!w) return;
            state.wellness.weight = parseFloat(w);
            state.wellness.bmi = (state.wellness.weight / (1.68 * 1.68)).toFixed(1);
            saveState();
            document.getElementById('bmi-label-display').innerText = `Weight: ${state.wellness.weight}kg | BMI: ${state.wellness.bmi}`;
        }

        function renderFinanceView() {
            const list = document.getElementById('finance-box-list');
            if(!list) return;
            list.innerHTML = state.finance.map(f => `
                <div class="bg-gray-800/40 p-3 rounded-xl border border-gray-800 flex justify-between items-center text-xs">
                    <span>${f.desc}</span>
                    <span class="${f.type === 'income' ? 'text-emerald-400' : 'text-rose-400'}">Rs. ${f.amount}</span>
                </div>`).join('');

            let income = state.finance.filter(f => f.type === 'income').reduce((a, b) => a + parseInt(b.amount || 0), 0);
            let expenses = state.finance.filter(f => f.type === 'expense').reduce((a, b) => a + parseInt(b.amount || 0), 0);
            document.getElementById('fin-total-lbl').innerText = `Rs. ${income - expenses}`;
        }

        function commitFinance() {
            let desc = document.getElementById('fin-desc').value;
            let amt = document.getElementById('fin-amt').value;
            let type = document.getElementById('fin-type').value;
            if(!desc || !amt) return;
            state.finance.push({ id: Date.now(), type, desc, amount: parseInt(amt) });
            saveState(); renderFinanceView();
        }

        function renderAIHistory() {
            const container = document.getElementById('chat-scroller');
            if(!container) return;
            container.innerHTML = `<div class="bg-gray-800/40 p-3 rounded-xl max-w-xl">Ask any daily learning strategy suggestion!</div>` + 
            state.chatHistory.map(c => `
                <div class="bg-gray-800/20 p-2 rounded-xl text-right ml-auto max-w-sm">You: ${c.q}</div>
                <div class="bg-purple-950/20 p-2 rounded-xl max-w-sm">AI: ${c.a}</div>`).join('');
            container.scrollTop = container.scrollHeight;
        }

        function dispatchAIQuery() {
            let input = document.getElementById('ai-query-input');
            if(!input.value) return;
            let query = input.value;
            let response = "That looks like an important objective! Set a 25-minute Pomodoro block to tackle it.";
            
            state.chatHistory.push({ q: query, a: response });
            saveState(); renderAIHistory(); input.value = '';
        }

        function initChart() {
            const ctx = document.getElementById('dashLineChart');
            if(!ctx) return;
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        data: [4, 5.5, 3.8, 6.2, 5, 7.5, 6],
                        borderColor: '#6366f1', fill: false, tension: 0.4
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        function exportData() {
            let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            let downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "lifebalance_backup.json");
            downloadAnchor.click();
        }

        function clearAllData() {
            if(confirm("Erase all data?")) { state = {...defaultState}; saveState(); switchTab('dashboard'); }
        }

        window.onload = () => { switchTab('dashboard'); updateGamificationUI(); };
    </script>
</body>
</html>
