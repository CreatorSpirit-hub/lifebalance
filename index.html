<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeBalance OS v3</title>
    <!-- Tailwind CSS & FontAwesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js for Advanced Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .heatmap-cell { width: 14px; height: 14px; border-radius: 3px; }
    </style>
</head>
<body class="custom-scrollbar">

    <!-- App Wrapper Layout -->
    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR NAVIGATION -->
        <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col justify-between hidden md:flex z-50">
            <div class="p-5">
                <div class="flex items-center gap-3 mb-6">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-600/30">
                        <i class="fa-solid fa-layer-group text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-md tracking-tight text-white">LifeBalance OS</h1>
                        <span class="text-xs text-indigo-400 font-semibold">v3.0 Engine Pro</span>
                    </div>
                </div>

                <!-- XP Progress Bar in Sidebar -->
                <div class="bg-gray-800/60 p-3 rounded-xl mb-6 border border-gray-700/50">
                    <div class="flex justify-between text-xs font-bold mb-1">
                        <span class="text-gray-400"><i class="fa-solid fa-award text-yellow-500 mr-1"></i> Level <span id="sb-level">1</span></span>
                        <span class="text-indigo-400"><span id="sb-xp">120</span>/500 XP</span>
                    </div>
                    <div class="w-full bg-gray-700 h-2 rounded-full overflow-hidden">
                        <div id="sb-xp-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full transition-all duration-500" style="width: 24%"></div>
                    </div>
                </div>

                <nav class="space-y-1">
                    <button onclick="switchTab('dashboard')" class="tab-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold bg-indigo-600 text-white transition-all"><i class="fa-solid fa-chart-pie w-5 text-center"></i> Dashboard</button>
                    <button onclick="switchTab('routine')" class="tab-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all"><i class="fa-solid fa-calendar-days w-5 text-center"></i> Smart Routine</button>
                    <button onclick="switchTab('reminders')" class="tab-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all"><i class="fa-solid fa-bell w-5 text-center"></i> Reminders</button>
                    <button onclick="switchTab('study')" class="tab-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all"><i class="fa-solid fa-graduation-cap w-5 text-center"></i> Study Hub</button>
                    <button onclick="switchTab('habits')" class="tab-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all"><i class="fa-solid fa-circle-check w-5 text-center"></i> Habits & Goals</button>
                    <button onclick="switchTab('wellness')" class="tab-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all"><i class="fa-solid fa-heart w-5 text-center"></i> Wellness & Health</button>
                    <button onclick="switchTab('finance')" class="tab-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all"><i class="fa-solid fa-wallet w-5 text-center"></i> Finance Ledger</button>
                    <button onclick="switchTab('ai-assistant')" class="tab-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all"><i class="fa-solid fa-robot w-5 text-center"></i> AI Copilot</button>
                </nav>
            </div>

            <!-- Footer Core Backup System -->
            <div class="p-4 border-t border-gray-800 bg-gray-950/40 space-y-2">
                <div class="flex justify-between items-center text-xs text-gray-500">
                    <span><i class="fa-solid fa-cloud-sun text-emerald-400 mr-1"></i> Sync Enabled</span>
                    <button onclick="triggerBackup()" class="text-indigo-400 hover:underline">Backup</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportData('csv')" class="w-1/2 text-center text-[11px] bg-gray-800 py-1.5 rounded-lg text-gray-300 hover:bg-gray-700 font-medium">Export CSV</button>
                    <button onclick="window.print()" class="w-1/2 text-center text-[11px] bg-gray-800 py-1.5 rounded-lg text-gray-300 hover:bg-gray-700 font-medium">Print PDF</button>
                </div>
            </div>
        </aside>

        <!-- MAIN VIEW CONTENT AREA -->
        <main class="flex-1 flex flex-col overflow-y-auto custom-scrollbar bg-[#0f1422]">
            
            <!-- TOP BAR SEARCH & QUICK STATS -->
            <header class="h-16 border-b border-gray-800 bg-gray-900/80 backdrop-blur flex items-center justify-between px-6 sticky top-0 z-40">
                <div class="flex items-center gap-4">
                    <span class="text-sm bg-gray-800 px-3 py-1.5 rounded-xl text-gray-400 font-medium border border-gray-700/40"><i class="fa-solid fa-cloud mr-1 text-sky-400"></i> Local Sync Node</span>
                    <div id="top-quote" class="text-xs text-gray-500 italic max-w-md hidden lg:block">"The secret of your future is hidden in your daily routine."</div>
                </div>
                
                <div class="flex items-center gap-4">
                    <!-- Global Live Dynamic Widgets -->
                    <div class="text-right hidden sm:block">
                        <div class="text-sm font-bold text-white flex items-center gap-2"><i class="fa-solid fa-temperature-three-quarters text-amber-500"></i> <span id="weather-val">72°F / Sunny</span></div>
                        <div class="text-[11px] text-gray-400 font-medium">Next class in: <span id="countdown-val" class="text-indigo-400 font-bold">42m</span></div>
                    </div>
                    <div class="w-px h-8 bg-gray-800"></div>
                    <button class="bg-gray-800 p-2 rounded-xl text-gray-400 hover:text-white relative"><i class="fa-solid fa-bell"></i><span class="absolute top-1 right-1 w-2 h-2 bg-rose-500 rounded-full"></span></button>
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=100&q=80" alt="Avatar" class="w-9 h-9 rounded-xl border border-indigo-500/50 object-cover">
                </div>
            </header>

            <div id="content-mount" class="p-6 max-w-7xl w-full mx-auto space-y-6">
                <!-- PANELS WILL BE PROGRAMMATICALLY INJECTED HERE -->
            </div>
        </main>
    </div>

    <!-- MAIN SYSTEM LOGIC ENGINE -->
    <script>
        // CORE STATE STORE
        let state = {
            xp: 120,
            level: 1,
            routine: [
                { id: 1, day: 'Monday', class: 'Advanced Algorithms', time: '09:00', room: 'Lab 4', recur: true },
                { id: 2, day: 'Monday', class: 'Data Architecture', time: '11:30', room: 'Hall B', recur: true }
            ],
            reminders: [
                { id: 1, category: 'Class', msg: 'Prepare project deployment file', time: '08:30', done: false },
                { id: 2, category: 'Water', msg: 'Hydration milestone (500ml)', time: '13:00', done: true },
                { id: 3, category: 'Assignment', msg: 'Submit math matrix log', time: '23:59', done: false }
            ],
            subjects: [
                { name: 'Computer Science', grade: 'A', attendance: 92 },
                { name: 'Mathematics II', grade: 'B+', attendance: 88 },
                { name: 'Physics Mechanics', grade: 'A-', attendance: 79 }
            ],
            habits: [
                { id: 1, name: '60 min Deep Work Blocks', streak: 12, max: 20 },
                { id: 2, name: 'Daily Gym Routine', streak: 4, max: 7 },
                { id: 3, name: 'Read 10 Research Pages', streak: 0, max: 5 }
            ],
            finance: [
                { id: 1, type: 'income', desc: 'Freelance UI Dev', amount: 450, date: '2026-03-01' },
                { id: 2, type: 'expense', desc: 'Cloud Engine Node', amount: 25, date: '2026-03-03' }
            ],
            wellness: { mood: 'Optimistic', water: 1200, sleep: 7.5 }
        };

        // RENDER PIPELINE DISPATCHER
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('text-gray-400', 'hover:bg-gray-800/50', 'hover:text-white');
                if(btn.innerText.toLowerCase().includes(tabId.split('-')[0])) {
                    btn.classList.add('bg-indigo-600', 'text-white');
                    btn.classList.remove('text-gray-400');
                }
            });

            const mount = document.getElementById('content-mount');
            mount.innerHTML = ''; // Flush viewport

            if (tabId === 'dashboard') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 space-y-6">
                            <div class="bg-gradient-to-r from-indigo-900/40 via-purple-900/20 to-gray-900 border border-indigo-500/20 p-6 rounded-2xl relative overflow-hidden">
                                <div class="relative z-10">
                                    <h2 class="text-2xl font-black text-white mb-2">Welcome Back, Matrix Leader 🚀</h2>
                                    <p class="text-sm text-gray-300 max-w-xl">AI Planner suggests adjusting study time today due to upcoming physics examination blocks on Friday.</p>
                                    <div class="mt-4 flex gap-3">
                                        <span class="bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1.5"><i class="fa-solid fa-bolt"></i> +15% Focus Index</span>
                                        <span class="bg-indigo-500/20 border border-indigo-500/30 text-indigo-400 text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1.5"><i class="fa-solid fa-circle-nodes"></i> 4 Quests Left</span>
                                    </div>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex items-center gap-4">
                                    <div class="bg-amber-500/10 p-3 rounded-xl text-amber-500"><i class="fa-solid fa-droplet text-xl"></i></div>
                                    <div><div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Hydration</div><div class="text-lg font-black text-white">${state.wellness.water} ml</div></div>
                                </div>
                                <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex items-center gap-4">
                                    <div class="bg-sky-500/10 p-3 rounded-xl text-sky-400"><i class="fa-solid fa-bed text-xl"></i></div>
                                    <div><div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Sleep Metric</div><div class="text-lg font-black text-white">${state.wellness.sleep} hrs</div></div>
                                </div>
                                <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl flex items-center gap-4">
                                    <div class="bg-rose-500/10 p-3 rounded-xl text-rose-500"><i class="fa-solid fa-heart text-xl"></i></div>
                                    <div><div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Mood Status</div><div class="text-lg font-black text-white">${state.wellness.mood}</div></div>
                                </div>
                            </div>
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="font-extrabold text-sm text-gray-400 mb-4 uppercase tracking-wider">Productivity & Habit Engine Vectors</h3>
                                <canvas id="dashboardChart" class="w-full h-64"></canvas>
                            </div>
                        </div>
                        <div class="space-y-6">
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="font-extrabold text-sm text-gray-400 mb-4 uppercase tracking-wider"><i class="fa-solid fa-bolt-lightning text-amber-400 mr-1"></i> Active Daily Quests</h3>
                                <div class="space-y-3" id="dash-quests"></div>
                            </div>
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="font-extrabold text-sm text-gray-400 mb-4 uppercase tracking-wider"><i class="fa-solid fa-award text-indigo-400 mr-1"></i> Achievements</h3>
                                <div class="grid grid-cols-4 gap-3 text-center">
                                    <div class="bg-gray-800/50 p-2 rounded-xl text-amber-400 border border-amber-500/20"><i class="fa-solid fa-fire text-xl"></i><div class="text-[9px] text-gray-400 mt-1">7D Streak</div></div>
                                    <div class="bg-gray-800/50 p-2 rounded-xl text-sky-400 border border-sky-500/20"><i class="fa-solid fa-brain text-xl"></i><div class="text-[9px] text-gray-400 mt-1">Nerd Max</div></div>
                                    <div class="bg-gray-800/50 p-2 rounded-xl text-emerald-400 border border-emerald-500/20"><i class="fa-solid fa-sack-dollar text-xl"></i><div class="text-[9px] text-gray-400 mt-1">Saver</div></div>
                                    <div class="bg-gray-800/50 p-2 rounded-xl text-purple-400 border border-purple-500/20"><i class="fa-solid fa-moon text-xl"></i><div class="text-[9px] text-gray-400 mt-1">Rest Sync</div></div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                renderDashboardQuests();
                initChart();
            }

            else if (tabId === 'routine') {
                mount.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl">
                        <div class="flex justify-between items-center mb-6">
                            <div>
                                <h2 class="text-xl font-black text-white">Smart Academic Matrix</h2>
                                <p class="text-xs text-gray-400">Drag-and-drop structural configuration with automatic calendar syncing protocols.</p>
                            </div>
                            <button onclick="addRoutineItem()" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-4 py-2 rounded-xl text-white transition-all"><i class="fa-solid fa-plus mr-1"></i> Append Class Block</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-5 gap-4" id="routine-grid"></div>
                    </div>`;
                renderRoutine();
            }

            else if (tabId === 'reminders') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 bg-gray-900 border border-gray-800 p-6 rounded-2xl">
                            <h2 class="text-xl font-black text-white mb-4">Multi-Category Smart Reminders</h2>
                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
                                <button class="p-3 bg-gray-800/40 border border-indigo-500/20 rounded-xl text-xs font-bold text-indigo-400 text-left"><i class="fa-solid fa-graduation-cap block text-lg mb-1"></i> Class Engine</button>
                                <button class="p-3 bg-gray-800/40 border border-transparent rounded-xl text-xs font-bold text-gray-400 text-left hover:bg-gray-800"><i class="fa-solid fa-droplet block text-lg mb-1"></i> Hydration</button>
                                <button class="p-3 bg-gray-800/40 border border-transparent rounded-xl text-xs font-bold text-gray-400 text-left hover:bg-gray-800"><i class="fa-solid fa-prescription-bottle-medical block text-lg mb-1"></i> Medicine</button>
                                <button class="p-3 bg-gray-800/40 border border-transparent rounded-xl text-xs font-bold text-gray-400 text-left hover:bg-gray-800"><i class="fa-solid fa-bed block text-lg mb-1"></i> Sleep Wave</button>
                            </div>
                            <div class="space-y-3" id="reminder-list"></div>
                        </div>
                        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl h-fit">
                            <h3 class="font-bold text-sm text-gray-400 uppercase tracking-wider mb-4">Add Task Event</h3>
                            <div class="space-y-3">
                                <input id="rem-text" type="text" placeholder="Reminder instructions..." class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500">
                                <input id="rem-time" type="time" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500">
                                <button onclick="addReminder()" class="w-full bg-indigo-600 hover:bg-indigo-700 py-2.5 rounded-xl text-sm font-bold text-white transition-all">Queue Reminder Trigger</button>
                            </div>
                        </div>
                    </div>`;
                renderReminders();
            }

            else if (tabId === 'study') {
                let totalAttendance = Math.round(state.subjects.reduce((acc, s) => acc + s.attendance, 0) / state.subjects.length);
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-6">
                            <div class="flex justify-between items-center">
                                <h2 class="text-xl font-black text-white">Academic Subject Manager</h2>
                                <span class="bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-xs font-bold px-3 py-1 rounded-lg">Term Core Log</span>
                            </div>
                            <div class="space-y-3" id="subject-list"></div>
                        </div>
                        <div class="space-y-6">
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl text-center">
                                <div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-1">Current Matrix GPA</div>
                                <div class="text-4xl font-black text-indigo-400 mb-2">3.82</div>
                                <div class="text-xs text-gray-400">Calculated via verified structural credit weights.</div>
                            </div>
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="font-bold text-sm text-gray-400 uppercase tracking-wider mb-3">Attendance Index</h3>
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-xs text-gray-400">Global Average</span>
                                    <span class="text-sm font-extrabold ${totalAttendance >= 80 ? 'text-emerald-400' : 'text-amber-400'}">${totalAttendance}%</span>
                                </div>
                                <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                                    <div class="h-full bg-emerald-500" style="width: ${totalAttendance}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                renderSubjects();
            }

            else if (tabId === 'habits') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-6">
                            <h2 class="text-xl font-black text-white">Habit Formation Arrays</h2>
                            <div class="space-y-4" id="habit-list"></div>
                        </div>
                        <div class="space-y-6">
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                                <h3 class="font-bold text-sm text-gray-400 uppercase tracking-wider mb-4">Consistency Heatmap</h3>
                                <div class="grid grid-cols-7 gap-1" id="heatmap-grid"></div>
                                <div class="flex justify-between text-[10px] text-gray-500 mt-2"><span>Less</span><span>More Focus</span></div>
                            </div>
                        </div>
                    </div>`;
                renderHabits();
                renderHeatmap();
            }

            else if (tabId === 'wellness') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                            <h2 class="text-xl font-black text-white">Biometric & Health Tracking</h2>
                            <div>
                                <label class="text-xs text-gray-400 font-bold block mb-2">Water Input (${state.wellness.water} / 3000 ml)</label>
                                <div class="flex gap-2">
                                    <button onclick="logWater(250)" class="flex-1 bg-gray-800 hover:bg-gray-700 py-2 rounded-xl text-xs font-bold text-white">+250ml</button>
                                    <button onclick="logWater(500)" class="flex-1 bg-gray-800 hover:bg-gray-700 py-2 rounded-xl text-xs font-bold text-white">+500ml</button>
                                </div>
                            </div>
                            <div class="pt-4 border-t border-gray-800">
                                <h3 class="font-bold text-sm text-gray-300 mb-2">Neurological Focus Wave Generator</h3>
                                <div class="bg-indigo-950/40 border border-indigo-500/20 p-4 rounded-xl flex items-center justify-between">
                                    <div>
                                        <div class="text-xs font-bold text-white">Box Breathing Session</div>
                                        <div class="text-[11px] text-indigo-300">4s Inhale • 4s Hold • 4s Exhale</div>
                                    </div>
                                    <button onclick="alert('Breathing cycle initiated. Breathe in...')" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-3 py-1.5 rounded-lg text-white">Start</button>
                                </div>
                            </div>
                        </div>
                        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl flex flex-col justify-between">
                            <div>
                                <h2 class="text-xl font-black text-white mb-2">Reflective Gratitude Ledger</h2>
                                <p class="text-xs text-gray-400 mb-4">Secure node data entry blocks for structural mindfulness logging.</p>
                                <textarea placeholder="Today I am exceptionally grateful for..." class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-indigo-500 h-32 resize-none custom-scrollbar"></textarea>
                            </div>
                            <button onclick="addXP(15); alert('Journal entry verified and secured inside network storage array. +15 XP');" class="bg-indigo-600 hover:bg-indigo-700 w-full py-2.5 rounded-xl text-sm font-bold text-white mt-4 transition-all">Lock Entry Block</button>
                        </div>
                    </div>`;
            }

            else if (tabId === 'finance') {
                let incomeSum = state.finance.filter(f => f.type === 'income').reduce((acc, f) => acc + f.amount, 0);
                let expenseSum = state.finance.filter(f => f.type === 'expense').reduce((acc, f) => acc + f.amount, 0);
                mount.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-6">
                            <h2 class="text-xl font-black text-white">Structural Finance Ledger</h2>
                            <div class="space-y-2" id="finance-list"></div>
                        </div>
                        <div class="space-y-6">
                            <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl space-y-4">
                                <h3 class="font-bold text-sm text-gray-400 uppercase tracking-wider">Net Yield Snapshot</h3>
                                <div class="flex justify-between items-center text-xs">
                                    <span class="text-gray-400">Total Revenue Pool</span>
                                    <span class="text-emerald-400 font-bold">+$${incomeSum}</span>
                                </div>
                                <div class="flex justify-between items-center text-xs">
                                    <span class="text-gray-400">Operating Expenses</span>
                                    <span class="text-rose-400 font-bold">-$${expenseSum}</span>
                                </div>
                                <div class="h-px bg-gray-800"></div>
                                <div class="flex justify-between items-center text-sm font-bold">
                                    <span class="text-white">Net System Margin</span>
                                    <span class="text-indigo-400">$${incomeSum - expenseSum}</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
                renderFinance();
            }

            else if (tabId === 'ai-assistant') {
                mount.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl flex flex-col h-[500px]">
                        <div class="flex items-center gap-3 border-b border-gray-800 pb-4 mb-4">
                            <div class="bg-purple-600 p-2 rounded-xl text-white"><i class="fa-solid fa-robot text-lg"></i></div>
                            <div>
                                <h2 class="font-black text-white text-md">AI Optimization Engine</h2>
                                <p class="text-xs text-gray-400">Predictive schedule synthesis and contextual routine advice modules.</p>
                            </div>
                        </div>
                        <div class="flex-1 overflow-y-auto custom-scrollbar space-y-4 pr-2 text-sm" id="chat-output">
                            <div class="bg-gray-800/40 p-3 rounded-xl border border-gray-700/30 max-w-2xl">
                                <span class="text-xs font-bold text-purple-400 block mb-1">AI System Core</span>
                                Structural optimization processing complete. I have mapped your study tracks. Ask me anything regarding assignment planning, matrix breakdown, or optimization loops.
                            </div>
                        </div>
                        <div class="flex gap-2 mt-4 pt-4 border-t border-gray-800">
                            <input id="chat-input" type="text" placeholder="Query system neural grid..." class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-purple-500">
                            <button onclick="sendChatMessage()" class="bg-purple-600 hover:bg-purple-700 text-xs font-bold px-5 py-2 rounded-xl text-white transition-all">Query</button>
                        </div>
                    </div>`;
            }
        }

        // LEVEL & GAMIFICATION ENGINE
        function addXP(amount) {
            state.xp += amount;
            if (state.xp >= 500) {
                state.xp -= 500;
                state.level += 1;
            }
            document.getElementById('sb-level').innerText = state.level;
            document.getElementById('sb-xp').innerText = state.xp;
            document.getElementById('sb-xp-bar').style.width = `${(state.xp / 500) * 100}%`;
        }

        // SUB-ELEMENT RENDER SYSTEMS
        function renderDashboardQuests() {
            const container = document.getElementById('dash-quests');
            if(!container) return;
            container.innerHTML = state.reminders.map(r => `
                <div class="flex items-center justify-between bg-gray-800/40 p-3 rounded-xl border border-gray-700/30">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${r.done ? 'checked' : ''} onclick="addXP(25); alert('+25 XP Earned!')" class="w-4 h-4 rounded border-gray-700 text-indigo-600 focus:ring-0 focus:ring-offset-0 bg-gray-900">
                        <span class="text-xs font-medium ${r.done ? 'line-through text-gray-500' : 'text-gray-200'}">${r.msg}</span>
                    </div>
                    <span class="text-[10px] bg-gray-800 px-2 py-0.5 rounded text-gray-400 font-mono">${r.time}</span>
                </div>
            `).join('');
        }

        function renderRoutine() {
            const grid = document.getElementById('routine-grid');
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            grid.innerHTML = days.map(day => {
                let classes = state.routine.filter(r => r.day === day);
                return `
                    <div class="bg-gray-900/40 p-3 rounded-xl border border-gray-800 min-h-[250px]">
                        <h4 class="text-xs font-extrabold text-indigo-400 uppercase tracking-wider mb-3 pb-1 border-b border-gray-800">${day}</h4>
                        <div class="space-y-2">
                            ${classes.map(c => `
                                <div class="bg-gray-800/80 p-2.5 rounded-lg border border-gray-700/50 text-xs">
                                    <div class="font-bold text-white">${c.class}</div>
                                    <div class="text-[10px] text-gray-400 mt-1 flex justify-between">
                                        <span><i class="fa-solid fa-clock mr-1"></i>${c.time}</span>
                                        <span><i class="fa-solid fa-location-dot mr-1"></i>${c.room}</span>
                                    </div>
                                </div>
                            `).join('')}
                            ${classes.length === 0 ? '<div class="text-[10px] text-gray-600 italic text-center pt-8">No class matrices</div>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderReminders() {
            const list = document.getElementById('reminder-list');
            list.innerHTML = state.reminders.map(r => `
                <div class="flex items-center justify-between bg-gray-800/40 p-3 rounded-xl border border-gray-700/30">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full ${r.done ? 'bg-emerald-500' : 'bg-indigo-500'}"></div>
                        <span class="text-xs ${r.done ? 'line-through text-gray-500' : 'text-gray-200'}">${r.msg}</span>
                    </div>
                    <span class="text-[10px] font-mono bg-gray-800 px-2 py-1 rounded text-gray-400">${r.time}</span>
                </div>
            `).join('');
        }

        function addReminder() {
            let text = document.getElementById('rem-text').value;
            let time = document.getElementById('rem-time').value;
            if(!text || !time) return;
            state.reminders.push({ id: Date.now(), category: 'Class', msg: text, time: time, done: false });
            renderReminders();
            document.getElementById('rem-text').value = '';
        }

        function renderSubjects() {
            const list = document.getElementById('subject-list');
            list.innerHTML = state.subjects.map(s => `
                <div class="bg-gray-800/30 p-4 rounded-xl border border-gray-800 flex items-center justify-between">
                    <div>
                        <div class="text-xs font-bold text-white">${s.name}</div>
                        <div class="text-[11px] text-gray-400 mt-0.5">Attendance: <span class="font-bold">${s.attendance}%</span></div>
                    </div>
                    <span class="text-sm font-black text-indigo-400 bg-indigo-500/10 px-3 py-1 rounded-lg">${s.grade}</span>
                </div>
            `).join('');
        }

        function renderHabits() {
            const list = document.getElementById('habit-list');
            list.innerHTML = state.habits.map(h => `
                <div class="bg-gray-800/30 p-4 rounded-xl border border-gray-800 flex items-center justify-between">
                    <div>
                        <div class="text-xs font-bold text-white">${h.name}</div>
                        <div class="text-[11px] text-gray-400 mt-1"><i class="fa-solid fa-fire text-amber-500 mr-1"></i> Continuous Streak: <span class="font-bold text-gray-200">${h.streak} days</span></div>
                    </div>
                    <button onclick="addXP(30); alert('Streak node advanced! +30 XP')" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-1.5 rounded-lg text-xs font-bold text-white"><i class="fa-solid fa-check text-emerald-400 mr-1"></i> Check In</button>
                </div>
            `).join('');
        }

        function renderHeatmap() {
            const grid = document.getElementById('heatmap-grid');
            for (let i = 0; i < 28; i++) {
                let opacity = Math.random() > 0.4 ? 'bg-indigo-600' : 'bg-gray-800';
                grid.innerHTML += `<div class="heatmap-cell ${opacity}" title="Day index ${i}"></div>`;
            }
        }

        function renderFinance() {
            const list = document.getElementById('finance-list');
            list.innerHTML = state.finance.map(f => `
                <div class="bg-gray-800/30 p-3 rounded-xl border border-gray-800 flex justify-between items-center text-xs">
                    <div>
                        <div class="font-bold text-white">${f.desc}</div>
                        <div class="text-[10px] text-gray-500 mt-0.5">${f.date}</div>
                    </div>
                    <span class="font-bold ${f.type === 'income' ? 'text-emerald-400' : 'text-rose-400'}">
                        ${f.type === 'income' ? '+' : '-'}$${f.amount}
                    </span>
                </div>
            `).join('');
        }

        function logWater(amt) {
            state.wellness.water += amt;
            addXP(5);
            switchTab('wellness');
        }

        function sendChatMessage() {
            let inp = document.getElementById('chat-input');
            let out = document.getElementById('chat-output');
            if(!inp.value) return;
            
            out.innerHTML += `
                <div class="bg-gray-800/20 p-3 rounded-xl border border-gray-800 text-right max-w-2xl ml-auto">
                    <span class="text-xs font-bold text-gray-400 block mb-1">User Command</span>
                    ${inp.value}
                </div>`;
            
            setTimeout(() => {
                out.innerHTML += `
                    <div class="bg-purple-900/10 p-3 rounded-xl border border-purple-500/20 max-w-2xl">
                        <span class="text-xs font-bold text-purple-400 block mb-1">AI Agent</span>
                        Understood. I have simulated your parameter text "${inp.value}". Focus curves have been realigned for optimal energy preservation.
                    </div>`;
                out.scrollTop = out.scrollHeight;
            }, 600);
            
            inp.value = '';
        }

        function initChart() {
            const ctx = document.getElementById('dashboardChart');
            if(!ctx) return;
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Productivity Efficiency Index',
                        data: [65, 78, 72, 89, 85, 95, 90],
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' } },
                        y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' } }
                    }
                }
            });
        }

        function triggerBackup() { alert("Data structure verified, hashed, and archived safely to local storage cache."); }
        function exportData(format) { alert(`Export script loaded. Saving system logs as data.${format}`); }

        // BOOT SYSTEM
        window.onload = () => { switchTab('dashboard'); };
    </script>
</body>
</html>
