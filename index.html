<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeBalance App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
    </style>
</head>
<body class="overflow-x-hidden">

    <audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav" preload="auto"></audio>

    <div id="auth-screen" class="fixed inset-0 bg-[#0b0f19] z-[100] flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl max-w-sm w-full text-center space-y-5">
            <div>
                <div class="bg-indigo-600 w-12 h-12 rounded-xl flex items-center justify-center text-white mx-auto text-xl mb-3 shadow-lg">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h2 id="auth-title" class="text-xl font-bold text-white">Welcome to LifeBalance</h2>
                <p class="text-xs text-gray-400 mt-1">Track your school routines, study schedules, and habits.</p>
            </div>

            <div class="space-y-3 text-left">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">Gmail / Email Address</label>
                    <input id="auth-email" type="email" placeholder="yourname@gmail.com" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">Password</label>
                    <input id="auth-password" type="password" placeholder="••••••••" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-indigo-500">
                </div>
            </div>

            <div class="space-y-2 pt-1">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 py-2.5 rounded-xl font-bold text-sm transition-all text-white">Sign Up with Email</button>
                
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-800"></div>
                    <span class="flex-shrink mx-4 text-gray-500 text-[11px] uppercase tracking-wider font-bold">Or</span>
                    <div class="flex-grow border-t border-gray-800"></div>
                </div>

                <button onclick="skipAuth()" class="w-full bg-gray-800 hover:bg-gray-700 py-2.5 rounded-xl font-bold text-sm transition-all text-gray-200 border border-gray-700">
                    <i class="fa-solid fa-user-secret mr-1.5 text-gray-400"></i> Skip & Use as Guest
                </button>
            </div>

            <p class="text-xs text-gray-400">Already have an account? <button onclick="toggleAuthMode()" id="auth-toggle-text" class="text-indigo-400 underline font-semibold">Log In</button></p>
        </div>
    </div>

    <div id="main-app" class="flex h-screen overflow-hidden hidden">
        <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col justify-between hidden md:flex z-50">
            <div class="p-5 overflow-y-auto h-full space-y-6">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                        <i class="fa-solid fa-house-laptop text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-md text-white">LifeBalance</h1>
                        <span id="user-display-email" class="text-xs text-indigo-400 block font-medium truncate max-w-[140px]">Guest Mode</span>
                    </div>
                </div>

                <div class="bg-gray-800/60 p-4 rounded-xl border border-gray-700/50">
                    <div class="flex justify-between text-xs font-bold mb-1">
                        <span class="text-gray-400"><i class="fa-solid fa-star text-yellow-500 mr-1"></i> Level <span id="sb-level">1</span></span>
                        <span class="text-indigo-400"><span id="sb-xp">0</span> / 500 XP</span>
                    </div>
                    <div class="w-full bg-gray-700 h-2 rounded-full overflow-hidden">
                        <div id="sb-xp-bar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <nav class="space-y-1">
                    <button onclick="switchTab('dashboard')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-chart-pie w-5 text-center text-indigo-400"></i> Dashboard</button>
                    <button onclick="switchTab('routine')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-calendar-days w-5 text-center text-sky-400"></i> Class Routine</button>
                    <button onclick="switchTab('reminders')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-bell w-5 text-center text-rose-400"></i> Reminders & Alarms</button>
                    <button onclick="switchTab('study')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-graduation-cap w-5 text-center text-amber-400"></i> Study Schedule</button>
                    <button onclick="switchTab('habits')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-circle-check w-5 text-center text-emerald-400"></i> Habits & Goals</button>
                    <button onclick="switchTab('wellness')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-heart w-5 text-center text-pink-400"></i> Water & Sleep</button>
                    <button onclick="switchTab('finance')" class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-400 hover:bg-gray-800/50 hover:text-white transition-all text-left"><i class="fa-solid fa-wallet w-5 text-center text-teal-400"></i> Money Tracker</button>
                </nav>
            </div>

            <div class="p-4 border-t border-gray-800 bg-gray-950/40">
                <button onclick="handleLogout()" class="w-full text-xs bg-gray-800 py-2 rounded-lg text-gray-300 hover:bg-gray-700 font-semibold transition-all" id="logout-btn">Log Out</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto bg-[#0f1422]">
            <header class="h-16 border-b border-gray-800 bg-gray-900/80 backdrop-blur flex items-center justify-between px-6 sticky top-0 z-40">
                <div class="text-sm bg-gray-800 px-3 py-1.5 rounded-xl text-gray-400 font-medium border border-gray-700/40">
                    <i class="fa-solid fa-circle-check mr-1 text-emerald-400"></i> Safe & Saved Locally
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-xs bg-indigo-500/10 text-indigo-400 px-2.5 py-1 rounded-md font-bold" id="header-xp-display">LVL 1</span>
                </div>
            </header>

            <div id="content-mount" class="p-6 max-w-7xl w-full mx-auto space-y-6"></div>
        </main>
    </div>

    <script>
        // APPLICATION STATE
        const defaultState = {
            isLoggedIn: false,
            isGuest: false,
            userEmail: '',
            xp: 0, level: 1,
            routine: [{ id: 1, day: 'Monday', class: 'English Class', time: '09:00', room: 'Room 102' }],
            studySchedule: [{ id: 1, day: 'Monday', time: '16:00', task: 'Math Practice Questions' }],
            reminders: [{ id: 1, msg: 'Complete grammar assignment', time: '08:00', done: false, useAlarm: true }],
            habits: [{ id: 1, name: 'Revise vocabulary words', streak: 2 }],
            goals: [{ id: 1, text: 'Score top grades in finals', complete: false }],
            finance: [{ id: 1, type: 'income', desc: 'Allowance', amount: 50 }],
            wellness: { water: 1000, sleep: 7.5 }
        };

        let state = JSON.parse(localStorage.getItem('LIFEBALANCE_SIMPLE_STORE')) || {...defaultState};
        let authMode = 'signup';

        function saveState() {
            localStorage.setItem('LIFEBALANCE_SIMPLE_STORE', JSON.stringify(state));
            updateGamificationUI();
        }

        function updateGamificationUI() {
            if(document.getElementById('sb-level')) {
                document.getElementById('sb-level').innerText = state.level;
                document.getElementById('sb-xp').innerText = state.xp;
                document.getElementById('sb-xp-bar').style.width = `${(state.xp / 500) * 100}%`;
                document.getElementById('header-xp-display').innerText = `LVL ${state.level} (${state.xp} XP)`;
            }
        }

        function addXP(amount) {
            state.xp += amount;
            if (state.xp >= 500) {
                state.xp -= 500;
                state.level += 1;
                triggerAlarmSound();
                alert(`🎉 Level Up! You reached Level ${state.level}!`);
            }
            saveState();
        }

        function triggerAlarmSound() {
            const sound = document.getElementById('alarm-sound');
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Audio alert triggered."));
            }
        }

        // SIGN UP, LOGIN, & GUEST CONTROL FUNCTIONS
        function toggleAuthMode() {
            authMode = authMode === 'signup' ? 'login' : 'signup';
            document.getElementById('auth-title').innerText = authMode === 'signup' ? 'Welcome to LifeBalance' : 'Log In to Account';
            document.getElementById('auth-btn').innerText = authMode === 'signup' ? 'Sign Up with Email' : 'Log In';
            document.getElementById('auth-toggle-text').innerText = authMode === 'signup' ? 'Log In' : 'Sign Up with Email';
        }

        function handleAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-password').value.trim();

            if (!email || !pass) {
                alert("Please fill out both fields to sign up or log in.");
                return;
            }

            state.isLoggedIn = true;
            state.isGuest = false;
            state.userEmail = email;
            saveState();
            checkLoginStatus();
        }

        // GUEST LOGIN FUNCTION
        function skipAuth() {
            state.isLoggedIn = false;
            state.isGuest = true;
            state.userEmail = 'Guest User';
            saveState();
            checkLoginStatus();
        }

        function handleLogout() {
            state.isLoggedIn = false;
            state.isGuest = false;
            state.userEmail = '';
            saveState();
            checkLoginStatus();
        }

        function checkLoginStatus() {
            if (state.isLoggedIn || state.isGuest) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display-email').innerText = state.userEmail;
                document.getElementById('logout-btn').innerText = state.isGuest ? 'Exit Guest Mode' : 'Log Out';
                updateGamificationUI();
                switchTab('dashboard');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        }

        // NAVIGATION SWITCHER
        function switchTab(tabId) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('text-gray-400');
                if(btn.getAttribute('onclick').includes(tabId)) {
                    btn.classList.add('bg-indigo-600', 'text-white');
                }
            });

            const mount = document.getElementById('content-mount');
            mount.innerHTML = '';

            if (tabId === 'dashboard') {
                mount.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl">
                        <h2 class="text-xl font-bold text-white mb-2">Welcome to Your Dashboard</h2>
                        <p class="text-sm text-gray-400">Track and view your tasks, schedules, and daily routines easily below.</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">
                            <div class="bg-gray-950 p-4 rounded-xl border border-gray-800">
                                <span class="text-xs text-gray-400 block font-bold">Total Routine Classes</span>
                                <span class="text-2xl font-black text-white">${state.routine.length} Loaded</span>
                            </div>
                            <div class="bg-gray-950 p-4 rounded-xl border border-gray-800">
                                <span class="text-xs text-gray-400 block font-bold">Incomplete Reminders</span>
                                <span class="text-2xl font-black text-rose-400">${state.reminders.filter(r=>!r.done).length} Pending</span>
                            </div>
                        </div>
                    </div>`;
            }

            else if (tabId === 'routine') {
                mount.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                        <div>
                            <h2 class="text-lg font-bold text-white">Your Class Routine</h2>
                            <p class="text-xs text-gray-400">Save your schedules and subjects below.</p>
                        </div>
                        <div class="flex flex-wrap gap-2 bg-gray-950 p-3 rounded-xl border border-gray-800">
                            <input id="rot-class" type="text" placeholder="Class Name" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none">
                            <select id="rot-day" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none">
                                <option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
                            </select>
                            <input id="rot-time" type="time" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none">
                            <input id="rot-room" type="text" placeholder="Room Number" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none">
                            <button onclick="addRoutine()" class="bg-indigo-600 hover:bg-indigo-700 text-xs font-bold px-4 py-1.5 rounded-lg text-white">Add Class</button>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3" id="routine-list"></div>
                    </div>`;
                renderRoutine();
            }

            else if (tabId === 'reminders') {
                mount.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                        <div>
                            <h2 class="text-lg font-bold text-white">Reminders & Alarm System</h2>
                            <p class="text-xs text-gray-400">Create reminders and opt to turn on an alarm sound alert.</p>
                        </div>
                        <div class="flex flex-wrap gap-2 items-center bg-gray-950 p-4 rounded-xl border border-gray-800">
                            <input id="rem-msg" type="text" placeholder="What do you need to do?" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none flex-1 min-w-[180px]">
                            <input id="rem-time" type="time" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none">
                            <label class="flex items-center gap-2 text-xs text-gray-300 font-medium cursor-pointer bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700">
                                <input id="rem-alarm" type="checkbox" checked class="accent-indigo-600">
                                <span>Allow Sound Alarm</span>
                            </label>
                            <button onclick="addReminder()" class="bg-rose-600 hover:bg-rose-700 text-xs font-bold px-4 py-1.5 rounded-lg text-white">Create</button>
                        </div>
                        <div class="space-y-2" id="reminders-list"></div>
                    </div>`;
                renderReminders();
            }

            else if (tabId === 'study') {
                mount.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                        <div>
                            <h2 class="text-lg font-bold text-white">Your Simple Study Schedule</h2>
                            <p class="text-xs text-gray-400">Map out specific study hours to prepare for topics or homework efficiently.</p>
                        </div>
                        <div class="flex flex-wrap gap-2 bg-gray-950 p-3 rounded-xl border border-gray-800">
                            <select id="sched-day" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none">
                                <option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
                            </select>
                            <input id="sched-time" type="time" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none">
                            <input id="sched-task" type="text" placeholder="Topic or subject to study..." class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none flex-1 min-w-[150px]">
                            <button onclick="addStudyBlock()" class="bg-amber-500 hover:bg-amber-600 text-xs font-bold px-4 py-1.5 rounded-lg text-gray-950">Save Hour</button>
                        </div>
                        <div class="space-y-2" id="study-list"></div>
                    </div>`;
                renderStudySchedule();
            }

            else if (tabId === 'habits') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl space-y-3">
                            <h3 class="font-bold text-sm text-white">Daily Habits</h3>
                            <button onclick="addHabit()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-xs font-bold py-1.5 rounded-lg">Add New Habit</button>
                            <div class="space-y-2 pt-2" id="habits-list"></div>
                        </div>
                        <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl space-y-3">
                            <h3 class="font-bold text-sm text-white">Long Term Goals</h3>
                            <button onclick="addGoal()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-xs font-bold py-1.5 rounded-lg">Add New Goal</button>
                            <div class="space-y-2 pt-2" id="goals-list"></div>
                        </div>
                    </div>`;
                renderHabits();
                renderGoals();
            }

            else if (tabId === 'wellness') {
                mount.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl text-center space-y-3">
                            <i class="fa-solid fa-glass-water text-2xl text-sky-400"></i>
                            <h3 class="font-bold text-sm text-white">Water Tracker</h3>
                            <div class="text-2xl font-black text-white">${state.wellness.water} mL</div>
                            <div class="flex justify-center gap-2">
                                <button onclick="changeWater(250)" class="bg-sky-600 hover:bg-sky-700 text-xs font-bold px-3 py-1 rounded-lg">+250mL</button>
                                <button onclick="changeWater(-250)" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold px-3 py-1 rounded-lg">-250mL</button>
                            </div>
                        </div>
                        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl text-center space-y-3">
                            <i class="fa-solid fa-bed text-2xl text-pink-400"></i>
                            <h3 class="font-bold text-sm text-white">Sleep Hours</h3>
                            <div class="text-2xl font-black text-white">${state.wellness.sleep} Hours</div>
                            <div class="flex justify-center gap-2">
                                <button onclick="changeSleep(0.5)" class="bg-pink-600 hover:bg-pink-700 text-xs font-bold px-3 py-1 rounded-lg">+0.5h</button>
                                <button onclick="changeSleep(-0.5)" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold px-3 py-1 rounded-lg">-0.5h</button>
                            </div>
                        </div>
                    </div>`;
            }

            else if (tabId === 'finance') {
                mount.innerHTML = `
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl space-y-4">
                        <h2 class="text-lg font-bold text-white">Money Tracker Ledger</h2>
                        <div class="flex gap-2 bg-gray-950 p-3 rounded-xl border border-gray-800">
                            <input id="fin-desc" type="text" placeholder="Item Name" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none flex-1">
                            <input id="fin-amount" type="number" placeholder="Amount" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none w-24">
                            <select id="fin-type" class="bg-gray-800 text-xs text-white px-3 py-1.5 rounded-lg border border-gray-700 outline-none">
                                <option value="income">Income</option>
                                <option value="expense">Expense</option>
                            </select>
                            <button onclick="addFinance()" class="bg-teal-600 hover:bg-teal-700 text-xs font-bold px-4 py-1.5 rounded-lg text-white">Save</button>
                        </div>
                        <div class="space-y-2" id="finance-list"></div>
                    </div>`;
                renderFinance();
            }
        }

        // ELEMENT RENDERING METHODS
        function renderRoutine() {
            const list = document.getElementById('routine-list');
            if(!list) return;
            list.innerHTML = state.routine.map(r => `
                <div class="bg-gray-950 p-4 rounded-xl border border-gray-800 flex justify-between items-start">
                    <div>
                        <span class="text-[10px] bg-sky-500/10 text-sky-400 px-2 py-0.5 rounded font-bold uppercase">${r.day}</span>
                        <h4 class="text-sm font-bold text-white mt-1">${r.class}</h4>
                        <p class="text-xs text-gray-400 mt-0.5">${r.time} • Room: ${r.room}</p>
                    </div>
                    <button onclick="removeRoutine(${r.id})" class="text-gray-500 hover:text-rose-400 text-xs"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function addRoutine() {
            const name = document.getElementById('rot-class').value.trim();
            const day = document.getElementById('rot-day').value;
            const time = document.getElementById('rot-time').value;
            const room = document.getElementById('rot-room').value.trim();

            if(!name || !time || !room) { alert('Please complete all form fields.'); return; }
            state.routine.push({ id: Date.now(), day, class: name, time, room });
            saveState(); renderRoutine();
            document.getElementById('rot-class').value = ''; document.getElementById('rot-room').value = '';
        }

        function removeRoutine(id) {
            state.routine = state.routine.filter(r => r.id !== id);
            saveState(); renderRoutine();
        }

        function renderReminders() {
            const list = document.getElementById('reminders-list');
            if(!list) return;
            list.innerHTML = state.reminders.map(r => `
                <div class="bg-gray-950 p-3 rounded-xl border border-gray-800 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <button onclick="toggleReminder(${r.id})" class="${r.done ? 'text-emerald-400':'text-gray-600'}">
                            <i class="fa-solid ${r.done ? 'fa-circle-check' : 'fa-circle'} text-base"></i>
                        </button>
                        <div>
                            <p class="text-xs font-semibold ${r.done ? 'line-through text-gray-500':'text-white'}">${r.msg}</p>
                            <span class="text-[10px] text-gray-500 block">Due: ${r.time} ${r.useAlarm ? '🔔 (Alarm Active)':''}</span>
                        </div>
                    </div>
                    <button onclick="removeReminder(${r.id})" class="text-gray-500 hover:text-rose-400 text-xs"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function addReminder() {
            const msg = document.getElementById('rem-msg').value.trim();
            const time = document.getElementById('rem-time').value;
            const useAlarm = document.getElementById('rem-alarm').checked;

            if(!msg || !time) { alert('Please include a detailed reminder message.'); return; }
            state.reminders.push({ id: Date.now(), msg, time, useAlarm, done: false });
            if(useAlarm) triggerAlarmSound();
            saveState(); renderReminders();
            document.getElementById('rem-msg').value = '';
        }

        function toggleReminder(id) {
            let rem = state.reminders.find(r => r.id === id);
            if(rem) {
                rem.done = !rem.done;
                if(rem.done) {
                    addXP(50);
                    if(rem.useAlarm) triggerAlarmSound();
                }
                saveState(); renderReminders();
            }
        }

        function removeReminder(id) {
            state.reminders = state.reminders.filter(r => r.id !== id);
            saveState(); renderReminders();
        }

        function renderStudySchedule() {
            const list = document.getElementById('study-list');
            if(!list) return;
            list.innerHTML = state.studySchedule.map(s => `
                <div class="bg-gray-950 p-3 rounded-xl border border-gray-800 flex justify-between items-center text-xs">
                    <div class="flex items-center gap-2">
                        <span class="bg-amber-500/10 text-amber-400 px-2 py-0.5 rounded font-bold uppercase">${s.day}</span>
                        <span class="text-gray-400 font-bold">${s.time}</span>
                        <span class="text-white">${s.task}</span>
                    </div>
                    <button onclick="removeStudyBlock(${s.id})" class="text-gray-500 hover:text-rose-400 text-xs"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function addStudyBlock() {
            const day = document.getElementById('sched-day').value;
            const time = document.getElementById('sched-time').value;
            const task = document.getElementById('sched-task').value.trim();

            if(!time || !task) { alert('Please configure an execution timeframe.'); return; }
            state.studySchedule.push({ id: Date.now(), day, time, task });
            saveState(); renderStudySchedule();
            document.getElementById('sched-task').value = '';
        }

        function removeStudyBlock(id) {
            state.studySchedule = state.studySchedule.filter(s => s.id !== id);
            saveState(); renderStudySchedule();
        }

        function renderHabits() {
            const container = document.getElementById('habits-list');
            if(!container) return;
            container.innerHTML = state.habits.map(h => `
                <div class="bg-gray-950 p-3 rounded-xl border border-gray-800 flex justify-between items-center text-xs">
                    <div>
                        <p class="font-bold text-white">${h.name}</p>
                        <p class="text-emerald-400 text-[10px] mt-0.5">🔥 ${h.streak} day streak</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="streakHabit(${h.id})" class="bg-emerald-600/20 text-emerald-400 border border-emerald-500/20 font-bold px-2 py-0.5 rounded text-[11px]">+1 Day</button>
                        <button onclick="removeHabit(${h.id})" class="text-gray-600 hover:text-rose-400"><i class="fa-solid fa-trash text-[11px]"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function addHabit() {
            const name = prompt("Enter habit title:");
            if(name) { state.habits.push({ id: Date.now(), name, streak: 0 }); saveState(); renderHabits(); }
        }

        function streakHabit(id) {
            let h = state.habits.find(x=>x.id===id);
            if(h) { h.streak++; addXP(20); saveState(); renderHabits(); }
        }

        function removeHabit(id) {
            state.habits = state.habits.filter(x=>x.id!==id); saveState(); renderHabits();
        }

        function renderGoals() {
            const container = document.getElementById('goals-list');
            if(!container) return;
            container.innerHTML = state.goals.map(g => `
                <div class="bg-gray-950 p-3 rounded-xl border border-gray-800 flex justify-between items-center text-xs">
                    <p class="text-white">${g.text}</p>
                    <button onclick="removeGoal(${g.id})" class="text-gray-600 hover:text-rose-400"><i class="fa-solid fa-trash text-[11px]"></i></button>
                </div>
            `).join('');
        }

        function addGoal() {
            const txt = prompt("Enter long term objective:");
            if(txt) { state.goals.push({ id: Date.now(), text: txt, complete: false }); saveState(); renderGoals(); }
        }

        function removeGoal(id) {
            state.goals = state.goals.filter(x=>x.id!==id); saveState(); renderGoals();
        }

        function changeWater(amt) {
            state.wellness.water = Math.max(0, state.wellness.water + amt);
            saveState(); switchTab('wellness');
        }

        function changeSleep(amt) {
            state.wellness.sleep = Math.max(0, state.wellness.sleep + amt);
            saveState(); switchTab('wellness');
        }

        function renderFinance() {
            const list = document.getElementById('finance-list');
            if(!list) return;
            list.innerHTML = state.finance.map(f => `
                <div class="bg-gray-950 p-2.5 rounded-xl border border-gray-800 flex justify-between items-center text-xs">
                    <span class="text-gray-200">${f.desc}</span>
                    <div class="flex items-center gap-3">
                        <span class="font-bold ${f.type==='income'?'text-emerald-400':'text-rose-400'}">${f.type==='income'?'+':'-'}$${f.amount}</span>
                        <button onclick="removeFinance(${f.id})" class="text-gray-600 hover:text-rose-400"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function addFinance() {
            const desc = document.getElementById('fin-desc').value.trim();
            const amt = parseFloat(document.getElementById('fin-amount').value);
            const type = document.getElementById('fin-type').value;

            if(!desc || isNaN(amt)) { alert('Please specify budget parameters.'); return; }
            state.finance.push({ id: Date.now(), desc, amount: amt, type });
            saveState(); switchTab('finance');
        }

        function removeFinance(id) {
            state.finance = state.finance.filter(f=>f.id!==id);
            saveState(); switchTab('finance');
        }

        window.onload = function() {
            checkLoginStatus();
        }
    </script>
</body>
</html>
